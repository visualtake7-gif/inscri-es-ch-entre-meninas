<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>UAADEM INSCRIÇÕES</title>
<link rel="icon" href="UAADEM (1).png" type="image/png">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
*{
  box-sizing:border-box;
  font-family: "Segoe UI", Arial, sans-serif;
}

body{
  margin:0;
  min-height:100vh;
  background:linear-gradient(135deg,#046101,#046101);
  display:flex;
  align-items:center;
  justify-content:center;
  padding:20px;
}

.card{
  width:100%;
  max-width:460px;
  background:#ffffff;
  border-radius:16px;
  box-shadow:0 20px 40px rgba(0,0,0,.15);
  overflow:hidden;
}

.header{
  background:linear-gradient(135deg,#08a002,#046101);
  color:#ffffff;
  padding:24px 24px 20px 24px;
}

.header h1{
  margin:0;
  font-size:22px;
  font-weight:700;
}

.header p{
  margin:6px 0 0;
  font-size:14px;
  opacity:.9;
}

.form-area{
  padding:24px;
}

.field{
  margin-bottom:16px;
}

label{
  display:block;
  font-size:13px;
  font-weight:600;
  margin-bottom:6px;
  color:#333;
}

input{
  width:100%;
  padding:12px 14px;
  border-radius:8px;
  border:1px solid #dcdcdc;
  font-size:15px;
  outline:none;
  transition:.2s;
}

input:focus{
  border-color:#1f6fff;
  box-shadow:0 0 0 2px rgba(31,111,255,.1);
}

button{
  width:100%;
  padding:14px;
  border:none;
  border-radius:10px;
  background:linear-gradient(135deg,#018845,#00b118);
  color:#fff;
  font-size:16px;
  font-weight:700;
  cursor:pointer;
  transition:.2s;
}

button:hover{
  transform:translateY(-1px);
  box-shadow:0 8px 18px rgba(31,111,255,.35);
}

button:disabled{
  opacity:.6;
  cursor:default;
  transform:none;
  box-shadow:none;
}

#msg{
  margin-top:14px;
  text-align:center;
  font-size:14px;
  font-weight:600;
  color:#1f6fff;
}

.footer{
  text-align:center;
  padding:14px;
  font-size:12px;
  color:#777;
  border-top:1px solid #eee;
}
.site-header{
  width:100%;
  background:#fff;
  text-align:center;
}

.site-header img{
  width:100%;
  max-height:180px;
  object-fit:cover;
  display:block;
}
/* Select (campo Área) */
select{
  width:100%;
  padding:12px 14px;
  border-radius:8px;
  border:1px solid #dcdcdc;
  font-size:15px;
  outline:none;
  background:#fff;
  color:#333;
  transition:.2s;
  appearance:none;
  -webkit-appearance:none;
  -moz-appearance:none;

  /* seta personalizada */
  background-image:
    url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%23666'><path d='M7 10l5 5 5-5z'/></svg>");
  background-repeat:no-repeat;
  background-position:right 12px center;
  background-size:18px;
  padding-right:40px;
}

/* foco igual os inputs */
select:focus{
  border-color:#1f6fff;
  box-shadow:0 0 0 2px rgba(31,111,255,.1);
}

/* placeholder visual */
select option[value=""]{
  color:#999;
}
</style>
</head>
<body>

<div class="card">
<div class="site-header">
  <img src="chá entre meninas 20 de março.png" alt="Banner do evento">
</div>
  <div class="header">
    <h1>Inscrição para o Chá entre Meninas</h1>
    <p>Preencha seus dados para garantir sua participação</p>
  </div>

  <div class="form-area">

    <form id="formInscricao">

      <div class="field">
        <label>Nome completo</label>
        <input type="text" name="nome" required>
      </div>

     <div class="field">
  <label for="telefone">Telefone</label>
  <input
    type="tel"
    id="telefone"
    name="telefone"
    placeholder="(91) 99999-9999"
    required
    autocomplete="tel"
    pattern="\([0-9]{2}\)\s[0-9]{5}-[0-9]{4}"
    title="Digite no formato (99) 99999-9999"
  >
</div>

      <div class="field">
        <label>E-mail</label>
        <input type="email" name="email">
      </div>

      <div class="field">
        <label>Congregação</label>
        <input type="text" name="congregacao" required>
      </div>
      <div class="field">
        <label>Grupo</label>
        <input type="text" name="grupo" required>
      </div>
      <div class="field">
  <label>Área</label>
  <select name="area" required>
    <option value="">Selecione a área</option>
    <option value="Curuçambá">Curuçambá</option>
    <option value="Distrito Industrial">Distrito Industrial</option>
    <option value="PAAR">PAAR</option>
    <option value="Guajará">Guajará</option>
  </select>
</div>


      <button type="submit" id="btn">
        Continuar para o pagamento
      </button>
      
    </form>

    <div id="msg"></div>

  </div>

  <div class="footer">
    Criado por Bruno Sistema de inscrição online
  </div>

</div>

<script>
const form = document.getElementById("formInscricao");
const msg  = document.getElementById("msg");
const btn  = document.getElementById("btn");

/* URL do Web App (Google Apps Script) */
const urlScript = "https://script.google.com/macros/s/AKfycbz1vTqZNoaqiAEhi8HE4DzyEIrr6DjUfJ6uYoz4Zn1OUOfF7w44XvByW1aTLumd0nnzJQ/exec";

/* Seu link de pagamento */
const linkPagamento = "https://nubank.com.br/cobrar/b64w8/69a20883-af0e-4ba3-a5df-cc08936dc523";

form.addEventListener("submit", function(e){
  e.preventDefault();

  btn.disabled = true;
  msg.innerText = "Salvando sua inscrição...";

  const dados = new FormData(form);

  fetch(urlScript,{
    method:"POST",
    body:dados
  })
  .then(r => r.text())
  .then(resposta => {

    if(resposta.trim() === "OK"){

      const confirmar = confirm(
  "🟢 CONFIRMAÇÃO NECCESSÁRIA\n\n" +
  "Sua confirmação será enviada por e-mail.\n\n" +
  "Antes de prosseguir para o pagamento, é obrigatório enviar o comprovante de inscrição ao seu líder de área.\n\n" +
  "Deseja continuar agora para o pagamento?"
);

      if(confirmar){
        msg.innerText = "Inscrição realizada. Redirecionando para o pagamento...";

        setTimeout(() => {
          window.location.href = linkPagamento;
        }, 800);

      }else{
        msg.innerText = "Envie o comprovante ao seu líder apos pagamento ";
        btn.disabled = false;
      }

    }else{
      msg.innerText = "Não foi possível salvar sua inscrição.";
      btn.disabled = false;
    }

  })
  .catch(() => {
    msg.innerText = "Falha na conexão. Tente novamente.";
    btn.disabled = false;
  });

});


function gerarComprovante(id){

  const nome = document.querySelector('[name="nome"]').value;
  const telefone = document.querySelector('[name="telefone"]').value;
  const email = document.querySelector('[name="email"]').value;
  const congregacao = document.querySelector('[name="congregacao"]').value;
  const area = document.querySelector('[name="area"]').value;

  const data = new Date().toLocaleString("pt-BR");

  const tela = window.open("", "_blank");

  tela.document.write(`
    <html>
    <head>
      <title>Comprovante de inscrição</title>
      <style>
        body{font-family:Arial;padding:30px}
        .box{max-width:600px;margin:auto;border:1px solid #ccc;padding:20px}
        h2{text-align:center}
      </style>
    </head>
    <body>

      <div class="box">
        <h2>Comprovante de inscrição</h2>

        <p><b>Código:</b> ${id}</p>
        <p><b>Nome:</b> ${nome}</p>
        <p><b>Telefone:</b> ${telefone}</p>
        <p><b>E-mail:</b> ${email}</p>
        <p><b>Congregação:</b> ${congregacao}</p>
        <p><b>Área:</b> ${area}</p>
        <p><b>Data:</b> ${data}</p>

      </div>

    </body>
    </html>
  `);

  tela.document.close();
}
</script>
</script>
</script>

</body>
</html>
