<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Inscrição - Evento</title>

<style>
body{
  font-family: Arial, sans-serif;
  background:#f2f4f7;
  margin:0;
  padding:0;
}

.container{
  max-width:420px;
  margin:40px auto;
  background:#fff;
  padding:25px;
  border-radius:8px;
  box-shadow:0 0 10px rgba(0,0,0,.1);
}

h2{
  text-align:center;
}

label{
  display:block;
  margin-top:12px;
  font-weight:600;
}

input{
  width:100%;
  padding:10px;
  margin-top:5px;
  border-radius:5px;
  border:1px solid #ccc;
}

button{
  width:100%;
  margin-top:20px;
  padding:12px;
  background:#1f6fff;
  border:none;
  color:#fff;
  font-size:16px;
  border-radius:6px;
  cursor:pointer;
}

button:disabled{
  opacity:.6;
}

#msg{
  text-align:center;
  margin-top:15px;
  font-weight:600;
}
</style>
</head>
<body>

<div class="container">

  <h2>Ficha de Inscrição</h2>

  <form id="formInscricao">

    <label>Nome completo</label>
    <input type="text" name="nome" required>

    <label>Telefone</label>
    <input type="text" name="telefone" required>

    <label>E-mail</label>
    <input type="email" name="email" required>

    <label>Congregação</label>
    <input type="text" name="congregacao" required>

    <button type="submit" id="btn">Continuar para o pagamento</button>

  </form>

  <div id="msg"></div>

</div>

<script>

const form = document.getElementById("formInscricao");
const msg  = document.getElementById("msg");
const btn  = document.getElementById("btn");

/* URL do Web App (Google Apps Script) */
const urlScript = "https://script.google.com/macros/s/AKfycbzn0HFct3jns7y8O1iN3CDlhXuTb_6bXGStlGr7c7R2insSzCRYQDBESN6AyFERBWM-mg/exec";

/* Seu link de pagamento */
const linkPagamento = "https://checkout.nubank.com.br/7c5DzBjn7G13vdnd";

form.addEventListener("submit", function(e){
  e.preventDefault();

  btn.disabled = true;
  msg.innerText = "Salvando inscrição...";

  const dados = new FormData(form);

  fetch(urlScript,{
    method: "POST",
    body: dados
  })
  .then(res => res.text())
  .then(resposta => {

    if(resposta === "OK"){
      msg.innerText = "Redirecionando para o pagamento...";
      setTimeout(()=>{
        window.location.href = linkPagamento;
      },700);
    }else{
      msg.innerText = "Erro ao salvar inscrição.";
      btn.disabled = false;
    }

  })
  .catch(()=>{
    msg.innerText = "Falha na conexão.";
    btn.disabled = false;
  });

});

</script>

</body>
</html>
